; Goldberg Steam Emulator (v0/v0.7 style) runtime config.
; This file is copied into the mounted WorldBox directory as goldberg.ini.
[Misc]
; Point this to the log sink when running in CI.
; e.g. /work/logs/goldberg.log
Logging=./goldberg.log

[SteamClient]
; Keep non-official Steam compatibility in a compatibility envelope:
; do not enable DLC/purchase behavior in automated test runs.
EnableSteam = 1

[SteamAPI]
; Enable the stubbed Steam API layer required by goldberg_*.dll.
; Keep true for launch paths that require Steam entrypoints.
UseSteamStub = 1
