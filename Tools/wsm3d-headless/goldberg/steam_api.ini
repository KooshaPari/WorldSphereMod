[steam]
; Explicit stub DLL path hint used by teams that run with explicit loader flags.
; Provide either a 64-bit or 32-bit DLL at the path used by your CI mount.
;
; Preferred in this container: /usr/local/share/goldberg/goldberg_steam_api64.dll
steam_api64_dll=/usr/local/share/goldberg/goldberg_steam_api64.dll
; Alternative if the game loader expects 32-bit:
steam_api_dll=/usr/local/share/goldberg/goldberg_steam_api.dll
