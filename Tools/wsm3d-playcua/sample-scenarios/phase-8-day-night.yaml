name: phase-8-day-night
output_dir: artifacts
default_wait_seconds: 1
steps:
  - action: load_save
    slot: 2
    optional: true
    settle_frames: 150
    bridge_wait_seconds: 90
    note: Load baseline save with sky visible for day/night verification.
  - action: wait_n_frames
    frames: 45
    fps: 30
    note: Allow world/sim to advance past asset-loading UI before telemetry gate.
  - action: wait_n_frames
    frames: 30
    fps: 1
    note: Extra settle so post-load frameMs spike (save transition) can decay.
  - action: health
    required: true
    note: Bridge health before phase work (isWorld3D may lag save transition).
  - action: assert_telemetry
    optional: true
    note: Soft probe — skips when still at menu or mid load (lastNonZeroDrawCalls=0).
    checks:
      - field: lastNonZeroDrawCalls
        op: ">"
        value: 0
      - field: frameMs
        op: "<"
        value: 12000
  - action: wait_n_frames
    frames: 15
    fps: 1
    note: Buffer after soft probe before hard telemetry gate.
  - action: assert_telemetry
    required: true
    note: Hard gate — game must be rendering before phase toggle.
    checks:
      - field: lastNonZeroDrawCalls
        op: ">"
        value: 0
      - field: frameMs
        op: "<"
        value: 12000
  - action: toggle_flag
    key: DayNightCycle
    value: true
    note: Enable Phase 8 time-of-day driver, procedural sky, and fog in SavedSettings.
  - action: wait_n_frames
    frames: 30
    fps: 30
    note: Allow sky gradient and fog to advance after phase toggle.
  - action: screenshot
    path: phase-8-day-night/sky-cycle.png
    vision:
      required: true
      prompt: >
        Validate that the scene shows a procedural sky with sun/moon gradient and
        atmospheric fog (not a flat solid-color skybox), with no obvious UI crash
        indicators or shader compile error banners. Return strict JSON with keys
        passes, reason, and confidence.
      criteria:
        must_show_day_night_cycle: true
        no_error_dialog: true
        no_shader_compile_banner: true
  - action: assert_telemetry
    required: true
    checks:
      - field: lastNonZeroDrawCalls
        op: ">"
        value: 0
      - field: frameMs
        op: "<"
        value: 12000

