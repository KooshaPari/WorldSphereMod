name: phase-3b-cloud-crossed-quad
output_dir: artifacts
default_wait_seconds: 1
steps:
  - action: load_save
    slot: 2
    optional: true
    settle_frames: 150
    bridge_wait_seconds: 90
    note: Load baseline save with foliage and sky/cloud effect content.
  - action: wait_n_frames
    frames: 45
    fps: 30
    note: Allow world/sim to advance past asset-loading UI before telemetry gate.
  - action: wait_n_frames
    frames: 30
    fps: 1
    note: Extra settle so post-load frameMs spike (save transition) can decay.
  - action: health
    required: true
    note: Bridge health before phase work (isWorld3D may lag save transition).
  - action: assert_telemetry
    optional: true
    note: Soft probe — skips when still at menu or mid load (lastNonZeroDrawCalls=0).
    checks:
      - field: lastNonZeroDrawCalls
        op: ">"
        value: 0
      - field: frameMs
        op: "<"
        value: 12000
  - action: wait_n_frames
    frames: 15
    fps: 1
    note: Buffer after soft probe before hard telemetry gate.
  - action: assert_telemetry
    required: true
    note: Hard gate — game must be rendering before phase toggle.
    checks:
      - field: lastNonZeroDrawCalls
        op: ">"
        value: 0
      - field: frameMs
        op: "<"
        value: 12000
  - action: toggle_flag
    key: CrossedQuadFoliage
    value: true
    note: Enable Phase 3b crossed-quad foliage and fx_cloud crossed-quad path.
  - action: wait_n_frames
    frames: 24
    fps: 30
    note: Allow foliage tile emit, fx_cloud mesh submit, and flush after toggle.
  - action: screenshot
    path: phase-3b-cloud-crossed-quad/foliage.png
    vision:
      required: true
      prompt: >
        Validate that surface foliage (trees, bushes, grass overlays) renders as 3D
        crossed-quad meshes with depth rather than flat 2D billboards, with no obvious
        UI crash indicators or shader compile error banners. Return strict JSON with
        keys passes, reason, and confidence.
      criteria:
        must_show_crossed_quad_foliage: true
        no_error_dialog: true
        no_shader_compile_banner: true
  - action: screenshot
    path: phase-3b-cloud-crossed-quad/clouds.png
    vision:
      required: true
      prompt: >
        Validate that sky clouds (fx_cloud effects) render as volumetric crossed-quad
        meshes with visible depth and sway, not flat sprite billboards, with no crash
        overlays. Return strict JSON with keys passes, reason, and confidence.
      criteria:
        must_show_cloud_crossed_quad: true
        no_error_dialog: true
        no_shader_compile_banner: true
  - action: assert_telemetry
    required: true
    checks:
      - field: lastNonZeroDrawCalls
        op: ">"
        value: 0
      - field: frameMs
        op: "<"
        value: 12000

