name: phase-4-mesh-water
output_dir: artifacts
default_wait_seconds: 1
steps:
  - action: load_save
    slot: 2
    optional: true
    note: Load baseline save with water-heavy world content.
  - action: wait_n_frames
    frames: 12
    fps: 30
  - action: health
    required: true
    expect_is_world_3d: true
    note: Bridge health before phase toggle.
  - action: assert_telemetry
    required: true
    note: Game must be rendering before phase toggle.
    checks:
      - field: lastNonZeroDrawCalls
        op: ">"
        value: 0
      - field: frameMs
        op: "<"
        value: 200
  - action: toggle_flag
    key: MeshWater
    value: true
    note: Enable Phase 4 mesh water surface in SavedSettings.
  - action: wait_n_frames
    frames: 18
    fps: 30
    note: Allow water mesh rebuild and Gerstner shader settle after phase toggle.
  - action: screenshot
    path: phase-4-mesh-water/water.png
    vision:
      required: true
      prompt: >
        Validate that water renders as a 3D mesh surface with Gerstner waves and
        shoreline foam rather than flat vanilla tiles, with no obvious UI crash
        indicators or shader compile error banners. Return strict JSON with keys
        passes, reason, and confidence.
      criteria:
        must_show_mesh_water: true
        no_error_dialog: true
        no_shader_compile_banner: true
  - action: assert_telemetry
    required: true
    checks:
      - field: drawCalls
        op: ">"
        value: 0
      - field: frameMs
        op: "<"
        value: 50
      - field: instances
        op: ">="
        value: 2
