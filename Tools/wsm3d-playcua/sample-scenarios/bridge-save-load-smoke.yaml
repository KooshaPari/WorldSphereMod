name: bridge-save-load-smoke
output_dir: artifacts
default_wait_seconds: 0.5
steps:
  - action: set_setting
    key: VoxelEntities
    value: true
    note: Ensure voxel emit path is active for telemetry probes.
  - action: set_setting
    key: DebugSanityCube
    value: true
    note: Submit probe cubes via MeshInstanceBatcher for lastNonZeroDrawCalls.
  - action: wait_n_frames
    frames: 30
    fps: 30
    note: Allow TickPerFrame + LateUpdate flush to populate telemetry cache.
  - action: health
    required: true
    note: Pre-save-load — bridge must respond before scene transition.
  - action: assert_telemetry
    required: true
    note: Pre-save-load telemetry baseline (menu/loading may spike frameMs).
    checks:
      - field: lastNonZeroDrawCalls
        op: ">"
        value: 0
      - field: frameMs
        op: "<"
        value: 4000
  - action: load_save
    optional: true
    slot: 2
    settle_frames: 120
    bridge_wait_seconds: 90
    note: Queue save2 load when slot exists; skipped gracefully if save2 is missing.
  - action: wait_n_frames
    frames: 6
    fps: 30
    note: >
      MANUAL (when load_save is skipped): In WorldBox, save the current world and
      load it (or load slot 2 from the menu). Continue only when the world is
      playable in 3D.
  - action: wait_n_frames
    frames: 45
    fps: 1
    note: Allow scene transition and bridge drain to settle after save/load (~45s).
  - action: health
    required: true
    note: >
      Post-reload — GET /health must return JSON (not null / 5s stall). isWorld3D
      may stay false until the player enters the 3D view for save2.
  - action: wait_n_frames
    frames: 30
    fps: 1
    note: Extra settle so post-load frameMs spike (save transition) can decay.
  - action: assert_telemetry
    required: true
    note: Post-reload telemetry — proves bridge drain survived save/load.
    checks:
      - field: lastNonZeroDrawCalls
        op: ">"
        value: 0
      - field: frameMs
        op: "<"
        value: 4000
