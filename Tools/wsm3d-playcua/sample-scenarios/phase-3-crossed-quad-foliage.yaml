name: phase-3-crossed-quad-foliage
output_dir: artifacts
default_wait_seconds: 1
steps:
  - action: load_save
    slot: 2
    optional: true
    note: Load baseline save with foliage-heavy world content.
  - action: wait_n_frames
    frames: 12
    fps: 30
  - action: health
    required: true
    expect_is_world_3d: true
    note: Bridge health before phase toggle.
  - action: assert_telemetry
    required: true
    note: Game must be rendering before phase toggle.
    checks:
      - field: lastNonZeroDrawCalls
        op: ">"
        value: 0
      - field: frameMs
        op: "<"
        value: 1500
  - action: toggle_flag
    key: CrossedQuadFoliage
    value: true
    note: Enable Phase 3 crossed-quad foliage meshes in SavedSettings.
  - action: wait_n_frames
    frames: 18
    fps: 30
    note: Allow foliage mesh emit and flush after phase toggle.
  - action: screenshot
    path: phase-3-crossed-quad-foliage/foliage.png
    vision:
      required: true
      prompt: >
        Validate that trees and bushes render as 3D crossed-quad foliage with wind
        animation rather than flat 2D sprites, with no obvious UI crash indicators
        or shader compile error banners. Return strict JSON with keys passes, reason,
        and confidence.
      criteria:
        must_show_crossed_quad_foliage: true
        no_error_dialog: true
        no_shader_compile_banner: true
  - action: assert_telemetry
    required: true
    checks:
      - field: drawCalls
        op: ">"
        value: 0
      - field: frameMs
        op: "<"
        value: 50
      - field: instances
        op: ">="
        value: 2
