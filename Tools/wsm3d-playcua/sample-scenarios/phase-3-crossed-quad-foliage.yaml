name: phase-3-crossed-quad-foliage
output_dir: artifacts
default_wait_seconds: 1
steps:
  - action: load_save
    slot: 2
    optional: true
    settle_frames: 150
    bridge_wait_seconds: 90
    note: Load baseline save with foliage-heavy world content.
  - action: wait_n_frames
    frames: 45
    fps: 30
    note: Allow world/sim to advance past asset-loading UI before telemetry gate.
  - action: wait_n_frames
    frames: 30
    fps: 1
    note: Extra settle so post-load frameMs spike (save transition) can decay.
  - action: health
    required: true
    note: Bridge health before phase work (isWorld3D may lag save transition).
  - action: assert_telemetry
    optional: true
    note: Soft probe — skips when still at menu or mid load (lastNonZeroDrawCalls=0).
    checks:
      - field: lastNonZeroDrawCalls
        op: ">"
        value: 0
      - field: frameMs
        op: "<"
        value: 12000
  - action: wait_n_frames
    frames: 15
    fps: 1
    note: Buffer after soft probe before hard telemetry gate.
  - action: assert_telemetry
    required: true
    note: Hard gate — game must be rendering before phase toggle.
    checks:
      - field: lastNonZeroDrawCalls
        op: ">"
        value: 0
      - field: frameMs
        op: "<"
        value: 12000
  - action: toggle_flag
    key: CrossedQuadFoliage
    value: true
    note: Enable Phase 3 crossed-quad foliage meshes in SavedSettings.
  - action: wait_n_frames
    frames: 18
    fps: 30
    note: Allow foliage mesh emit and flush after phase toggle.
  - action: screenshot
    path: phase-3-crossed-quad-foliage/foliage.png
    vision:
      required: true
      prompt: >
        Validate that trees and bushes render as 3D crossed-quad foliage with wind
        animation rather than flat 2D sprites, with no obvious UI crash indicators
        or shader compile error banners. Return strict JSON with keys passes, reason,
        and confidence.
      criteria:
        must_show_crossed_quad_foliage: true
        no_error_dialog: true
        no_shader_compile_banner: true
  - action: assert_telemetry
    required: true
    checks:
      - field: lastNonZeroDrawCalls
        op: ">"
        value: 0
      - field: frameMs
        op: "<"
        value: 12000

