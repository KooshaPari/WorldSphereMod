name: phase-10-lod
output_dir: artifacts
default_wait_seconds: 1
steps:
  - action: load_save
    slot: 2
    optional: true
    settle_frames: 150
    bridge_wait_seconds: 90
    note: Load baseline save with many distant actors for LOD ladder verification.
  - action: wait_n_frames
    frames: 45
    fps: 30
    note: Allow world/sim to advance past asset-loading UI before telemetry gate.
  - action: wait_n_frames
    frames: 30
    fps: 1
    note: Extra settle so post-load frameMs spike (save transition) can decay.
  - action: health
    required: true
    note: Bridge health before phase work (isWorld3D may lag save transition).
  - action: assert_telemetry
    optional: true
    note: Soft probe — skips when still at menu or mid load (lastNonZeroDrawCalls=0).
    checks:
      - field: lastNonZeroDrawCalls
        op: ">"
        value: 0
      - field: frameMs
        op: "<"
        value: 12000
  - action: wait_n_frames
    frames: 15
    fps: 1
    note: Buffer after soft probe before hard telemetry gate.
  - action: assert_telemetry
    required: true
    note: Hard gate — game must be rendering before phase toggle.
    checks:
      - field: lastNonZeroDrawCalls
        op: ">"
        value: 0
      - field: frameMs
        op: "<"
        value: 12000
  - action: set_setting
    key: LODScale
    value: 0.5
    note: Apply Phase 10 default LODScale (SavedSettings.cs) via bridge.
  - action: wait_n_frames
    frames: 24
    fps: 30
    note: Allow LOD distance thresholds to recompute after LODScale update.
  - action: screenshot
    path: phase-10-lod/lod-ladder.png
    vision:
      required: true
      prompt: >
        Validate that the world shows a mix of near full voxel meshes and distant
        simplified proxies or impostor billboards (LOD ladder active), with no obvious
        UI crash indicators or shader compile error banners. Return strict JSON with
        keys passes, reason, and confidence.
      criteria:
        must_show_lod_ladder: true
        no_error_dialog: true
        no_shader_compile_banner: true
  - action: assert_telemetry
    required: true
    checks:
      - field: lastNonZeroDrawCalls
        op: ">"
        value: 0
      - field: frameMs
        op: "<"
        value: 12000

