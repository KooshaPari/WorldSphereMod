name: screenshot-vercel

on:
  workflow_run:
    workflows: ["vercel-production"]
    types: [completed]
    branches:
      - main
      - claude/research-ultraplan-fork-DdgI5
  workflow_dispatch:
    inputs:
      base_url:
        description: "Vercel URL to capture"
        required: false
        default: "https://worldspheremod.vercel.app"

permissions:
  contents: read
  deployments: read

concurrency:
  group: screenshot-vercel-${{ github.event.workflow_run.head_sha || github.sha }}
  cancel-in-progress: true

env:
  DEFAULT_VERCEL_URL: https://worldspheremod.vercel.app

jobs:
  capture:
    name: Capture Vercel Screenshots
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "20"

      - name: Install Playwright Chromium
        run: |
          npm install --no-save playwright
          npx playwright install --with-deps chromium

      - name: Resolve Vercel URL
        id: target
        uses: actions/github-script@v7
        env:
          FALLBACK_URL: ${{ github.event.inputs.base_url || env.DEFAULT_VERCEL_URL }}
        with:
          script: |
            let url = process.env.FALLBACK_URL;
            const repo = { owner: context.repo.owner, repo: context.repo.repo };
            const run = context.payload.workflow_run;
            if (run?.head_sha) {
              const deployments = await github.paginate(
                github.rest.repos.listDeployments,
                { ...repo, sha: run.head_sha, environment: 'production', per_page: 20 }
              );
              for (const { id } of deployments) {
                const { data: statuses } =
                  await github.rest.repos.listDeploymentStatuses({
                    ...repo,
                    deployment_id: id,
                    per_page: 1
                  });
                const candidate =
                  statuses[0]?.environment_url || statuses[0]?.target_url;
                if (candidate) {
                  url = candidate;
                  break;
                }
              }
            }
            url = url.replace(/\/+$/, '');
            core.setOutput('base-url', url);
            core.info(`Capturing screenshots from ${url}`);

      - name: Capture screenshots
        shell: bash
        run: |
          set -euo pipefail
          BASE_URL="${{ steps.target.outputs.base-url }}"
          mkdir -p screenshots

          npx playwright screenshot --full-page "$BASE_URL/journeys/phase-previews/" screenshots/phase-previews.png
          npx playwright screenshot --full-page "$BASE_URL/tooling" screenshots/tooling.png
          npx playwright screenshot --full-page "$BASE_URL/index" screenshots/index.png

      - name: Upload screenshots artifact
        uses: actions/upload-artifact@v4
        with:
          name: vercel-production-screenshots
          path: screenshots/*.png
          if-no-files-found: error
