name: vercel-preview

# Deploys a Vercel Preview for every pull request that touches the
# VitePress docs site.
#
# Follows the Phenotype-org pattern (see KooshaPari/Tracera
# .github/workflows/docs-deploy.yml): vercel pull -> vercel build ->
# vercel deploy --prebuilt, driven by the official Vercel CLI rather
# than a third-party action.
#
# Required repository secrets (one-time setup):
#   TODO: VERCEL_TOKEN       - personal Vercel token with deploy access
#                              (https://vercel.com/account/tokens)
#   TODO: VERCEL_ORG_ID      - from .vercel/project.json after `vercel link`
#   TODO: VERCEL_PROJECT_ID  - from .vercel/project.json after `vercel link`

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "docs/**"
      - "vercel.json"
      - ".github/workflows/vercel-preview.yml"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: vercel-preview-${{ github.ref }}
  cancel-in-progress: true

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy-preview:
    name: Deploy Vercel Preview
    runs-on: ubuntu-latest
    environment:
      name: preview
      url: ${{ steps.deploy.outputs.preview-url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: docs/package-lock.json

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel environment information
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build project artifacts
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel (preview)
        id: deploy
        run: |
          DEPLOYMENT_URL=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "preview-url=$DEPLOYMENT_URL" >> "$GITHUB_OUTPUT"
          echo "Deployed to: $DEPLOYMENT_URL"

      - name: Comment PR with preview URL
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const previewUrl = '${{ steps.deploy.outputs.preview-url }}';
            const body = [
              '## WorldSphereMod docs preview deployed',
              '',
              `Preview URL: ${previewUrl}`,
              '',
              'This preview tracks the latest commit on this PR.'
            ].join('\n');
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });
