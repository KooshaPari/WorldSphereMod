name: vercel-production

# Deploys the VitePress docs site to Vercel Production on every push
# to the active dev branch.
#
# Follows the Phenotype-org pattern (see KooshaPari/Tracera
# .github/workflows/docs-deploy.yml): vercel pull -> vercel build --prod ->
# vercel deploy --prebuilt --prod, driven by the official Vercel CLI.
#
# The active dev branch is currently `claude/research-ultraplan-fork-DdgI5`
# (mirroring docs-deploy.yml). `main` is also wired so that once the fork
# lands there the same production deploy fires.
#
# Required repository secrets (one-time setup):
#   TODO: VERCEL_TOKEN       - personal Vercel token with deploy access
#                              (https://vercel.com/account/tokens)
#   TODO: VERCEL_ORG_ID      - from .vercel/project.json after `vercel link`
#   TODO: VERCEL_PROJECT_ID  - from .vercel/project.json after `vercel link`

on:
  push:
    branches:
      - main
      - claude/research-ultraplan-fork-DdgI5
    paths:
      - "docs/**"
      - "vercel.json"
      - ".github/workflows/vercel-production.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: vercel-production
  cancel-in-progress: false

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy-production:
    name: Deploy Vercel Production
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://worldspheremod.vercel.app
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: docs/package-lock.json

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel environment information
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build project artifacts
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel (production)
        id: deploy
        run: |
          DEPLOYMENT_URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "deployment-url=$DEPLOYMENT_URL" >> "$GITHUB_OUTPUT"
          echo "Deployed to: $DEPLOYMENT_URL"
