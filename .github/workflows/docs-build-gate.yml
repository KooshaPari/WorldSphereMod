name: docs-build-gate

# Blocking quality gate: PRs touching docs/** must produce a buildable
# VitePress site. Mirrors DINOForge -gate.yml naming convention.
#
# NOTE: Requires a `package.json` at repo root with a `docs:build` script
# (VitePress). If `package.json` does not exist yet, the workflow runs but
# the build step is skipped with a clear "ready when paths land" notice.

on:
  pull_request:
    paths:
      - "docs/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/docs-build-gate.yml"
  push:
    branches: [main, "claude/**"]
    paths:
      - "docs/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/docs-build-gate.yml"

permissions:
  contents: read

jobs:
  vitepress-build:
    name: VitePress build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Detect package.json
        id: detect
        shell: bash
        run: |
          if [ -f "package.json" ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "::notice::package.json not present yet — VitePress workflow ready when path lands."
          fi

      - name: Setup Node
        if: steps.detect.outputs.found == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        if: steps.detect.outputs.found == 'true'
        run: |
          if [ -f "package-lock.json" ]; then
            npm ci
          else
            npm install
          fi

      - name: Build docs
        if: steps.detect.outputs.found == 'true'
        run: npm run docs:build

      - name: Upload docs artifact
        if: steps.detect.outputs.found == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: docs-dist
          path: docs/.vitepress/dist
          if-no-files-found: ignore
