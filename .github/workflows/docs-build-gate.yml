name: docs-build-gate

# Blocking quality gate: PRs touching docs/** must produce a buildable
# VitePress site. Mirrors DINOForge -gate.yml naming convention.

on:
  pull_request:
    paths:
      - "docs/**"
      - "docs/package.json"
      - "docs/package-lock.json"
      - ".github/workflows/docs-build-gate.yml"
  push:
    branches: [main, "claude/**"]
    paths:
      - "docs/**"
      - "docs/package.json"
      - "docs/package-lock.json"
      - ".github/workflows/docs-build-gate.yml"

permissions:
  contents: read

jobs:
  vitepress-build:
    name: VitePress build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: docs/package-lock.json

      - name: Install dependencies
        working-directory: docs
        run: npm ci

      - name: Build docs
        working-directory: docs
        run: npm run docs:build

      - name: Upload docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs-dist
          path: docs/.vitepress/dist
          if-no-files-found: ignore
