name: journeys-gate

# Regression gate: validates all Phenotype journey manifests parse correctly
# and the verify CLI can ingest them in mock mode (schema-only, no actual
# screenshot verification).

on:
  pull_request:
    paths:
      - ".github/workflows/journeys-gate.yml"
      - "docs/journeys/**"
  push:
    branches: [main, "claude/**"]
    paths:
      - ".github/workflows/journeys-gate.yml"
      - "docs/journeys/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  journeys-verify:
    name: journeys verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@1.86.0

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Clone and build phenotype-journey
        shell: bash
        run: |
          set -euo pipefail
          git clone https://github.com/KooshaPari/phenotype-journeys /tmp/pj
          cd /tmp/pj
          cargo build --release --bin phenotype-journey

      - name: Validate manifests JSON
        shell: bash
        run: |
          set -euo pipefail
          echo "Validating manifest JSON structure..."
          jq . docs/journeys/manifests/*/manifest.json > /dev/null
          echo "✓ All manifests are valid JSON"

      - name: Check phase preview fixtures
        shell: bash
        run: |
          set -euo pipefail

          fixtures=(
            docs/journeys/phase-previews/phase-1-voxel-actors/before.png
            docs/journeys/phase-previews/phase-1-voxel-actors/after.png
            docs/journeys/phase-previews/phase-2-mesh-buildings/before.png
            docs/journeys/phase-previews/phase-2-mesh-buildings/after.png
            docs/journeys/phase-previews/phase-3-crossed-foliage/before.png
            docs/journeys/phase-previews/phase-3-crossed-foliage/after.png
            docs/journeys/phase-previews/phase-4-mesh-water/before.png
            docs/journeys/phase-previews/phase-4-mesh-water/after.png
            docs/journeys/phase-previews/phase-5-shadows/before.png
            docs/journeys/phase-previews/phase-5-shadows/after.png
            docs/journeys/phase-previews/phase-6-skeletal/before.png
            docs/journeys/phase-previews/phase-6-skeletal/after.png
            docs/journeys/phase-previews/phase-6-skeletal/after-idle.png
            docs/journeys/phase-previews/phase-6-skeletal/after-walk-a.png
            docs/journeys/phase-previews/phase-6-skeletal/after-walk-b.png
            docs/journeys/phase-previews/phase-6-skeletal/after-death.png
            docs/journeys/phase-previews/phase-7-worldspace-ui/before.png
            docs/journeys/phase-previews/phase-7-worldspace-ui/after.png
            docs/journeys/phase-previews/phase-8-day-night/before.png
            docs/journeys/phase-previews/phase-8-day-night/after.png
            docs/journeys/phase-previews/phase-8-day-night/after-0.png
            docs/journeys/phase-previews/phase-8-day-night/after-1.png
            docs/journeys/phase-previews/phase-8-day-night/after-2.png
            docs/journeys/phase-previews/phase-8-day-night/after-3.png
            docs/journeys/phase-previews/phase-9-particles/before.png
            docs/journeys/phase-previews/phase-9-particles/after.png
            docs/journeys/phase-previews/phase-10-lod/before.png
            docs/journeys/phase-previews/phase-10-lod/after.png
          )

          echo "Checking ${#fixtures[@]} canonical phase preview PNGs..."

          missing=0
          for fixture in "${fixtures[@]}"; do
            if [[ ! -s "$fixture" ]]; then
              echo "::error file=$fixture::Missing or empty canonical phase preview PNG"
              missing=1
            fi
          done

          if [[ "$missing" -ne 0 ]]; then
            exit 1
          fi

          distinct_count=$(sha256sum "${fixtures[@]}" | awk '{ print $1 }' | sort -u | wc -l | tr -d ' ')
          echo "Distinct fixture hashes: $distinct_count"

          if [[ "$distinct_count" -lt 8 ]]; then
            echo "::error::Expected at least 8 distinct phase preview PNG hashes; got $distinct_count"
            exit 1
          fi

          echo "✓ Phase preview fixtures exist and are sufficiently distinct"

      - name: Verify manifests in mock mode
        shell: bash
        run: |
          set -euo pipefail
          PJ_BIN="/tmp/pj/target/release/phenotype-journey"
          MANIFEST_DIR="docs/journeys/manifests"

          echo "Verifying all manifests with phenotype-journey (mock mode)..."

          for manifest in $(find "$MANIFEST_DIR" -maxdepth 2 -name "manifest.json" | sort); do
            phase_id=$(basename $(dirname "$manifest"))
            echo ""
            echo "→ $phase_id"

            # Run verify in mock mode; accept failure from screenshot checks but
            # reject errors from schema/binary issues. Extract just result status.
            "$PJ_BIN" verify "$manifest" --mode mock 2>&1 | tail -5
          done

          echo ""
          echo "✓ All manifests verified"

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: journeys-manifests
          path: docs/journeys/manifests/
          if-no-files-found: ignore
