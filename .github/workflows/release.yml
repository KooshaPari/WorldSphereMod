name: release

# Alpha tag release pipeline: build WorldSphereAPI, extract changelog from CHANGELOG.md,
# and publish a pre-release GitHub Release with artifacts.
#
# Triggers:
# 1. push: tags: ['v*']           — automatically on tag push (e.g., git push origin v2.0.0-alpha.0)
# 2. workflow_dispatch: inputs.version — manual dispatch with a custom version string

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g., v2.0.0-alpha.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      # See docs/ci-mod-compile-gap.md — mod DLL from hosted CI is not shippable.
      - name: Stub WorldBox reference DLLs
        shell: bash
        run: bash Tools/ci-stub-worldbox-refs.sh

      - name: Build WorldSphereAPI (always works — netstandard2.0)
        run: dotnet build WorldSphereAPI.csproj -c Release

      - name: Build WorldSphereMod (best-effort — see docs/ci-mod-compile-gap.md)
        continue-on-error: true
        run: dotnet build WorldSphereMod.csproj -c Release

      - name: Extract release notes from CHANGELOG.md
        id: changelog
        shell: bash
        run: |
          # Extract the [Unreleased] section from CHANGELOG.md
          if [ -f CHANGELOG.md ]; then
            # Use awk to extract text between [Unreleased] and the next version header
            NOTES=$(awk '/^## \[Unreleased\]/{flag=1; next} /^## \[/{flag=0} flag' CHANGELOG.md | sed -e '/^$/d')
            # Limit to 5000 chars after extraction to avoid broken pipe
            NOTES="${NOTES:0:5000}"
            # If empty, use a default message
            if [ -z "$NOTES" ]; then
              NOTES="Alpha release — see CHANGELOG.md for details."
            fi
          else
            NOTES="Alpha release"
          fi

          # Safely output to GitHub output using EOF delimiter
          {
            echo "body<<EOF"
            echo "$NOTES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Determine release tag
        id: tag
        shell: bash
        run: |
          TAG="${{ github.ref_name }}"
          if [ -z "$TAG" ] || [ "$TAG" = "HEAD" ]; then
            TAG="${{ inputs.version }}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "WorldSphereMod3D ${{ steps.tag.outputs.tag }}"
          body: ${{ steps.changelog.outputs.body }}
          prerelease: true
          generate_release_notes: false
          files: |
            bin/Release/netstandard2.0/WorldSphereAPI.dll
            WorldSphereMod/mod.json
            README.md
            CHANGELOG.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
